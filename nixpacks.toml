# Nixpacks Configuration for Skynet Fiber FieldOps
# Based on successful setup from skynet-ebilling

[phases.setup]
aptPkgs = [
    "nginx"
]
nixPkgs = [
    "php84",
    "php84Packages.composer",
    "php84Extensions.pdo_pgsql",
    "php84Extensions.bcmath",
    "php84Extensions.sockets",
    "php84Extensions.xml",
    "php84Extensions.mbstring",
    "php84Extensions.ctype",
    "php84Extensions.curl",
    "php84Extensions.dom",
    "php84Extensions.fileinfo",
    "php84Extensions.filter",
    "php84Extensions.tokenizer",
    "php84Extensions.pcntl",
    "php84Extensions.posix",
    "php84Extensions.zip",
    "php84Extensions.gd",
    "php84Extensions.intl",
    "php84Extensions.exif",
    "nodejs_20",
    "npm-9_x",
    "iputils"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=php",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build",
    "mkdir -p /var/log/nginx /var/lib/nginx /tmp/nginx",
    "cp docker/nginx.conf /etc/nginx/nginx.conf || cp docker/nginx.conf /etc/nginx/sites-available/default"
]

[start]
cmd = "sh deploy.sh ; php-fpm -y docker/php-fpm.conf -R & nginx -g 'daemon off;'"
